services:
  flask_app:
    build: .
    image: flask_app
    container_name: flask_app
    restart: always
    networks:
      - backend
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    links:
      - "postgres:${POSTGRES_HOST}"
    env_file:
      - .env  
    depends_on:
      - postgres

  postgres:
    image: postgres:17-alpine
    container_name: psgr
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    networks:
      - backend
  
networks:
  backend:
    driver: bridge

volumes:
  postgres-data:
